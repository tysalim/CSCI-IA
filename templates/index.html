{% extends 'base.html' %}
{% block title %}PriceTrak • Home{% endblock %}
{% block content %}
  <div class="hero-section">
    <h1>Track Product Prices Instantly</h1>
    <p class="text-muted" style="font-size: 1.1rem; margin-top: 1rem;">Paste an Amazon or Lazada product link below to begin tracking.</p>
  </div>

  <form action="/track" method="POST" class="mt-4">
    <div class="input-group" style="margin-bottom: 1.5rem;">
      <input type="url" class="form-control" name="url" placeholder="Enter product URL (e.g. https://amazon.com/... or https://www.lazada.com.ph/...)" required>
      <button class="btn btn-primary" type="submit">Track</button>
    </div>
  </form>
{% endblock %}
